services:
  - type: web
    name: devdojo-backend
    env: python
    region: oregon
    plan: free
    rootDir: backend
    buildCommand: pip install --only-binary :all: -r requirements.txt || pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    pythonVersion: 3.11
      - key: FRONTEND_URL
        fromService:
          name: devdojo-frontend
          type: web
          property: url

  - type: web
    name: devdojo-frontend
    env: node
    region: oregon
    plan: free
    rootDir: frontend
    buildCommand: npm install && npm run build
    startCommand: npm install -g serve && serve -s build -l $PORT
    envVars:
      - key: REACT_APP_API_URL
        fromService:
          name: devdojo-backend
          type: web
          property: url
