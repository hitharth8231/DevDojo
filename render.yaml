services:
  - type: web
    name: devdojo-backend
    runtime: python3
    buildCommand: cd backend && pip install -r requirements.txt
    startCommand: cd backend && uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: devdojo-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
  - type: pserv
    name: devdojo-db
    runtime: postgresql
    ipAllowList: []  # Only accessible from other services in this project